#ElementalCraft client config
[elementalcraft-client]
	#The duration of block ranges display.
	# Default: 600
	# Range: 0 ~ 10000
	rangeDisplayDuration = 600

	[elementalcraft-client.shadowBlocks]
		#Display a shadow where pedestals can be placed.
		renderPedestalShadow = true
		#Display a shadow where shrine upgrades can be placed.
		renderShrineUpgradeShadow = true
		#Display a shadow where instruments can be placed.
		renderInstrumentShadow = true

	[elementalcraft-client.gauge]
		#Use pale element gauges.
		usePaleElementGauge = false
		#the offset of the gauge on the X axis.
		# Default: 0
		# Range: -10000 ~ 10000
		gaugeOffsetX = 0
		#the offset of the gauge on the Y axis.
		# Default: 0
		# Range: -10000 ~ 10000
		gaugeOffsetY = 0
