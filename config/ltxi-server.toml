#Controls whether player-wielded non-melee weapons and offensive machines FROM THIS MOD ONLY can damage other players.
#This setting respects the base game's PVP rule. Use this if you want PVP but otherwise feel that this mod's weaponry is too unbalanced.
enable_mod_pvp = false
#Base energy capacity of the LTX tools
# Default: 80000
# Range: > 1
tools_energy_capacity = 80000
#Base energy cost per action (dig/attack/etc.) of the LTX tools
# Default: 400
# Range: > 1
tools_energy_per_action = 400
#If set to true the LTX Axe will always vein-mine/chop down ALL log structures regardless of natural leaves presence.
#Off by default. Recommended to keep disabled to limit axe to natural trees only.
axe_always_chops_logs = false
